name: MERN CI/CD

on:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Backend
        run: echo "Render auto-deploys from GitHub"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install & Build
        working-directory: client
        run: |
          npm install
          npm run build
      - name: Deploy to Netlify
        run: echo "Netlify auto-deploys from GitHub"
